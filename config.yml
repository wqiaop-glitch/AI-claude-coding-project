# ── 角色规则 ─────────────────────────────────────
role_rules:
  # 标题+描述宽匹配（至少命中一个才保留）
  # 注意：设为空列表 [] 则跳过 allow 检查，仅靠 deny 排除不想要的
  allow_any: []

  # 标题命中即拒（工程/ML 方向）
  deny_any:
    - "software engineer"
    - "backend"
    - "frontend"
    - "full stack"
    - "fullstack"
    - "machine learning"
    - "ml engineer"
    - "ml intern"
    - "devops"
