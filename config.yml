# ============================================================
# Job Agent 配置文件
# ============================================================

agent:
  daily_target: 100           # 每日输出目标条数
  recent_days: 60             # 只保留最近 N 天发布的职位

# ── 搜索关键词 ──────────────────────────────────
search:
  # 职位标题必须包含以下任意关键词（不区分大小写）
  include_keywords:
    - "intern"
    - "internship"
    - "part-time"
    - "part time"
    - "co-op"
    - "coop"

  # 季节关键词（额外加分）
  season_keywords:
    - "summer 2026"
    - "spring 2026"
    - "fall 2026"
    - "2026"

  # 排除词：命中标题则直接丢弃
  exclude_keywords:
    - "senior"
    - "staff"
    - "lead"
    - "principal"
    - "manager"
    - "director"
    - "vp"

  # 目标城市（命中加分）
  preferred_cities:
    - "San Francisco"
    - "New York"
    - "Seattle"
    - "Austin"
    - "Boston"
    - "Los Angeles"
    - "Chicago"
    - "Remote"

