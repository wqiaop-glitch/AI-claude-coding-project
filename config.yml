# ── 求职方向 career_tracks（BA/PM/MA/DA）─────────
career_tracks:
  BA:
    label: "Business Analyst"
    resume_file: "resumes/Bridgette-BA -Resume.pdf"
    match_keywords:
      - "business analyst"
      - "business intelligence"
      - "operations analyst"
      - "strategy analyst"
      - "financial analyst"
      - "consulting"
      - "business operations"
  PM:
    label: "Product Manager"
    resume_file: "resumes/Bridgette-Product role-Resume.pdf"
    match_keywords:
      - "product manager"
      - "product analyst"
      - "program manager"
      - "project manager"
      - "product operations"
      - "TPM"
      - "technical program"
      - "growth"
  MA:
    label: "Marketing Analyst"
    resume_file: "resumes/Bridgette- Marketing analyst-Resume.pdf"
    match_keywords:
      - "marketing"
      - "brand"
      - "content"
      - "social media"
      - "communications"
      - "market research"
      - "digital marketing"
      - "advertising"
      - "campaign"
  DA:
    label: "Data Analyst"
    resume_file: "resumes/Bridgette-BA-Resume.pdf"
    match_keywords:
      - "data analyst"
      - "data science"
      - "analytics"
      - "reporting"
      - "insights"
      - "visualization"
      - "sql"
      - "tableau"
      - "bi analyst"
  default:
    label: "General"
    resume_file: "resumes/Bridgette-BA -Resume.pdf"

